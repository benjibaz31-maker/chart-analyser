name: ChartAnalyzer Reports

on:
  schedule:
    # Journal PDF : vendredi à 20h00 UTC
    - cron: "0 20 * * 5"
    # Scoring matinal : lundi-vendredi à 7h00 UTC
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: weekly ou morning"
        required: true
        default: "weekly"

jobs:
  report:
    name: "Rapport / Scoring"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Installation des dependances"
        run: pip install requests reportlab

      - name: "Determine mode"
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" == "5" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
          fi

      - name: "Execution"
        env:
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          SMTP_LOGIN:        ${{ secrets.SMTP_LOGIN }}
          EMAIL_PASS:        ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          GROQ_KEY:          ${{ secrets.GROQ_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAIRS:             ${{ vars.PAIRS || 'XAU/EUR,XAU/USD' }}
          REPORT_MODE:       ${{ steps.mode.outputs.mode }}
        run: python weekly_report.py

      - name: "Resume"
        if: always()
        run: echo "Report termine $(date -u '+%Y-%m-%d %H:%M') UTC - Mode ${{ steps.mode.outputs.mode }}"
