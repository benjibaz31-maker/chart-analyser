name: ChartAnalyzer Scanner XAU/EUR

on:
  schedule:
    # Toutes les 15 minutes — lun-ven (marché ouvert)
    # Note : le script vérifie aussi en interne les heures de marché
    - cron: "0,15,30,45 * * * 1-5"
    # Dimanche soir dès 22h UTC
    - cron: "0,15,30,45 22,23 * * 0"

  # Lancement manuel depuis l'interface GitHub (pour tester)
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forcer l'analyse même marché fermé"
        required: false
        default: "false"

jobs:
  scan:
    name: "Scan XAU/EUR H1+H4"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Récupération du code ──
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ──
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dépendances ──
      - name: "📦 Installation des dépendances"
        run: pip install -r requirements.txt

      # ── 4. Lancement du scanner ──
      - name: "🔍 Scan XAU/EUR"
        env:
          PAIR:        ${{ vars.PAIR || 'XAU/EUR' }}
          GROQ_KEY:    ${{ secrets.GROQ_KEY }}
          TWELVE_KEY:  ${{ secrets.TWELVE_KEY }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS:  ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          MIN_SCORE:   ${{ vars.MIN_SCORE || '65' }}
          BALANCE:     ${{ vars.BALANCE || '1000' }}
        run: python scanner.py

      # ── 5. Résumé dans les logs GitHub ──
      - name: "✅ Résumé"
        if: always()
        run: echo "Scan terminé à $(date -u '+%Y-%m-%d %H:%M') UTC"
